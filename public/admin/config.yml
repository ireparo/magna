backend:
  name: github
  repo: ireparo/magna
  branch: main
  # Auth: per defecte Sveltia fa servir el seu proxy OAuth hospedat (api.sveltia.app).
  # PKCE i implicit estan deprecated/no suportats per GitHub a dia d'avui.
  # Si en algun moment volem self-host de l'OAuth, configurar `base_url` aquí.

# Carpeta on Sveltia puja les imatges. La ruta pública (com es referencia
# des del web) és /uploads/<nom-fitxer>.
media_folder: public/uploads
public_folder: /uploads

# Idioma del panell (Sveltia: en, es, fr, de, it, ja, nl, pt-BR, ru, zh-CN, zh-TW — no hi ha català, fem servir es)
locale: es

slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: site
    label: Contingut MAGNA
    description: Edita el contingut visible al web. En desar es publicarà automàticament en 1-2 minuts.
    files:
      # ─────────────────────────────────────────
      - file: content/contact.json
        label: 📞 Contacte
        name: contact
        description: Telèfon, email, adreça i horari del centre. Apareix al peu, a /contacte i als botons de WhatsApp.
        fields:
          - { name: phone_display, label: 'Telèfon (com es mostra)', widget: string, hint: 'Ex: +34 666 11 22 33' }
          - { name: whatsapp_number, label: 'WhatsApp (només números, format internacional)', widget: string, hint: 'Ex: 34666112233 — sense + ni espais' }
          - { name: email, label: Email, widget: string }
          - { name: address, label: Adreça, widget: string, hint: 'Ex: C/ Major, 12 — 25001 Lleida' }
          - { name: hours, label: Horari, widget: string, hint: 'Ex: Dilluns a Divendres · 09:00 – 20:00' }

      # ─────────────────────────────────────────
      - file: content/team.json
        label: 👥 Equip
        name: team
        description: Membres de l'equip que apareixen a /equip. Pots afegir, treure i reordenar.
        fields:
          - name: members
            label: Membres
            widget: list
            label_singular: Membre
            summary: '{{fields.name}} — {{fields.role}}'
            fields:
              - { name: name, label: Nom complet, widget: string }
              - { name: role, label: Rol, widget: string, hint: 'Ex: Fisioterapeuta · Cofundador/a' }
              - { name: bio, label: Biografia curta, widget: text }
              - { name: initials, label: Inicials, widget: string, hint: 'Es mostren si encara no has pujat foto. Ex: MP' }
              - { name: image, label: Foto, widget: image, required: false, hint: 'Quadrat. Si no en puges es mostren les inicials.' }

      # ─────────────────────────────────────────
      - file: content/prices.json
        label: 💶 Tarifes
        name: prices
        description: Plans i preus que apareixen a /tarifes. Marca un com a "destacat" per ressaltar-lo.
        fields:
          - name: plans
            label: Plans
            widget: list
            label_singular: Pla
            summary: '{{fields.name}} — {{fields.price}}'
            fields:
              - { name: name, label: Nom del pla, widget: string }
              - { name: price, label: Preu, widget: string, hint: 'Ex: 45€' }
              - { name: unit, label: Unitat, widget: string, hint: 'Ex: 60 min' }
              - { name: description, label: Descripció, widget: text }
              - name: features
                label: Característiques
                widget: list
                field: { name: feature, label: Característica, widget: string }
              - { name: cta, label: Text del botó, widget: string }
              - { name: highlighted, label: Destacat (cocoa)?, widget: boolean, default: false }

      # ─────────────────────────────────────────
      - file: content/services.json
        label: 🩺 Serveis (cards de la home)
        name: services
        description: Els 6 serveis amb foto que apareixen a la home i a /serveis.
        fields:
          - name: items
            label: Serveis
            widget: list
            label_singular: Servei
            summary: '{{fields.title}}'
            fields:
              - { name: title, label: Títol, widget: string }
              - { name: description, label: Descripció, widget: text }
              - { name: image, label: Foto del servei, widget: image, hint: 'Aspecte 4:3 ideal. Es retalla automàticament.' }

      # ─────────────────────────────────────────
      - file: content/centre.json
        label: 🏛️ El centre (galería interior)
        name: centre
        description: Secció "El centre" de la home — títol, intro i 4 fotos del local.
        fields:
          - { name: title, label: Títol (negre), widget: string, hint: 'Ex: Un espai pensat' }
          - { name: title_italic, label: Títol (cursiva taupe), widget: string, hint: 'Ex: per moure''t.' }
          - { name: intro, label: Text introductori, widget: text }
          - name: photos
            label: Fotos
            widget: list
            label_singular: Foto
            summary: '{{fields.caption}}'
            fields:
              - { name: src, label: Imatge, widget: image }
              - { name: caption, label: Llegenda, widget: string }

      # ─────────────────────────────────────────
      - file: content/site.json
        label: 🖼️ Hero i façana
        name: site
        description: Foto principal de la portada i foto de la façana a /contacte.
        fields:
          - { name: hero_image, label: Foto principal del hero, widget: image, hint: 'La foto gran de la portada (vertical 3:4 ideal).' }
          - { name: hero_image_caption, label: Llegenda sota el hero, widget: string }
          - { name: facade_image, label: Foto de la façana del centre, widget: image, hint: 'Apareix a /contacte al costat de l''horari.' }
