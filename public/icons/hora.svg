<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Clock circle -->
  <circle cx="24" cy="24" r="19"/>
  <!-- Hour hand (pointing to 12) -->
  <line x1="24" y1="24" x2="24" y2="14"/>
  <!-- Minute hand (pointing to 12 — full hour) -->
  <line x1="24" y1="24" x2="33" y2="24"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="1.5" fill="currentColor"/>
  <!-- 60 min marks at 12, 3, 6, 9 -->
  <line x1="24" y1="5" x2="24" y2="8"/>
  <line x1="43" y1="24" x2="40" y2="24"/>
  <line x1="24" y1="43" x2="24" y2="40"/>
  <line x1="5" y1="24" x2="8" y2="24"/>
</svg>
